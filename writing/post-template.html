<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post title — Etai Mizrahi</title>
  <style>
    :root {
      --cyan: #00D4FF;
      --purple: #7C3AED;
      --bg: #07070f;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: rgba(255,255,255,0.38);
      --mid: rgba(255,255,255,0.62);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15.5px;
      line-height: 1.7;
      padding: 72px 24px 100px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
      z-index: 50;
    }

    #orb {
      position: fixed;
      pointer-events: none;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(0, 212, 255, 0.06) 0%,
        rgba(124, 58, 237, 0.04) 40%,
        transparent 70%
      );
      transform: translate(-50%, -50%);
      z-index: 0;
      will-change: left, top;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      z-index: 0;
    }

    .blob-1 {
      width: 480px; height: 480px;
      top: -120px; right: -80px;
      background: radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%);
      animation: drift1 18s ease-in-out infinite alternate;
    }

    .blob-2 {
      width: 420px; height: 420px;
      bottom: -80px; left: -100px;
      background: radial-gradient(circle, rgba(124,58,237,0.09) 0%, transparent 70%);
      animation: drift2 22s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 50px) scale(1.1); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-25px, -40px) scale(1.08); }
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      transition: color 0.15s, border-color 0.15s;
    }
    a:hover {
      color: var(--cyan);
      border-color: rgba(0,212,255,0.4);
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.83rem;
      color: var(--muted);
      border: none;
      margin-bottom: 48px;
      transition: color 0.15s;
    }
    .back:hover { color: var(--cyan); border: none; }

    .post-date {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.18;
      color: #fff;
      margin-bottom: 48px;
    }

    .post-body {
      font-size: 1rem;
      color: var(--mid);
      line-height: 1.8;
    }

    .post-body p { margin-bottom: 1.5em; }

    .post-body h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin: 2.2em 0 0.7em;
    }

    .post-body ul, .post-body ol {
      padding-left: 1.4em;
      margin-bottom: 1.5em;
    }

    .post-body li { margin-bottom: 0.4em; }

    .post-body blockquote {
      border-left: 2px solid rgba(0,212,255,0.3);
      margin: 1.5em 0;
      padding-left: 1.2em;
      color: var(--muted);
      font-style: italic;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 52px 0 40px;
    }

    .post-footer {
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      body { padding: 52px 20px 80px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div id="orb"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">

    <a class="back" href="../index.html">← Etai Mizrahi</a>

    <p class="post-date">Month DD, YYYY</p>
    <h1>Your post title goes here</h1>

    <div class="post-body">

      <p>Opening paragraph. Write something worth reading.</p>

      <h2>A section heading</h2>

      <p>More thoughts here.</p>

    </div>

    <div class="divider"></div>
    <p class="post-footer"><a href="../index.html">← Back</a></p>

  </div>

  <script>
    const orb = document.getElementById('orb');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let cx = mx, cy = my;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    function animate() {
      cx += (mx - cx) * 0.08;
      cy += (my - cy) * 0.08;
      orb.style.left = cx + 'px';
      orb.style.top  = cy + 'px';
      requestAnimationFrame(animate);
    }
    animate();
  </script>

</body>
</html>
